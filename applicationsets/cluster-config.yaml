apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-config
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - cluster: cluster-dev
            url: https://api.dev.example.com:6443
            environment: development
          - cluster: cluster-prod
            url: https://api.prod.example.com:6443
            environment: production
  template:
    metadata:
      name: '{{ .cluster }}-config'
      labels:
        cluster: '{{ .cluster }}'
        environment: '{{ .environment }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/your-org/ocp-ztp-gitops.git
        targetRevision: main
        path: cluster-config/overlays/{{ .cluster }}
      destination:
        server: '{{ .url }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
