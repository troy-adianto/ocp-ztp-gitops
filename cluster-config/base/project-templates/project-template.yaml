apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: project-request
  namespace: openshift-config
  annotations:
    description: "Default project template with standard configurations"
objects:
  - apiVersion: project.openshift.io/v1
    kind: Project
    metadata:
      name: ${PROJECT_NAME}
      annotations:
        openshift.io/description: ${PROJECT_DESCRIPTION}
        openshift.io/display-name: ${PROJECT_DISPLAYNAME}
        openshift.io/requester: ${PROJECT_REQUESTING_USER}
      labels:
        environment: ${ENVIRONMENT}

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: admin
      namespace: ${PROJECT_NAME}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: admin
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: User
        name: ${PROJECT_ADMIN_USER}

  - apiVersion: v1
    kind: ResourceQuota
    metadata:
      name: default-quota
      namespace: ${PROJECT_NAME}
    spec:
      hard:
        requests.cpu: ${QUOTA_CPU_REQUESTS}
        requests.memory: ${QUOTA_MEMORY_REQUESTS}
        limits.cpu: ${QUOTA_CPU_LIMITS}
        limits.memory: ${QUOTA_MEMORY_LIMITS}
        pods: ${QUOTA_PODS}

  - apiVersion: v1
    kind: LimitRange
    metadata:
      name: default-limits
      namespace: ${PROJECT_NAME}
    spec:
      limits:
        - type: Container
          default:
            cpu: 200m
            memory: 256Mi
          defaultRequest:
            cpu: 50m
            memory: 64Mi

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: default-deny-ingress
      namespace: ${PROJECT_NAME}
    spec:
      podSelector: {}
      policyTypes:
        - Ingress

  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-same-namespace
      namespace: ${PROJECT_NAME}
    spec:
      podSelector: {}
      ingress:
        - from:
            - podSelector: {}
      policyTypes:
        - Ingress

parameters:
  - name: PROJECT_NAME
    required: true
  - name: PROJECT_DISPLAYNAME
    required: false
  - name: PROJECT_DESCRIPTION
    required: false
  - name: PROJECT_ADMIN_USER
    required: true
  - name: PROJECT_REQUESTING_USER
    required: true
  - name: ENVIRONMENT
    value: development
  - name: QUOTA_CPU_REQUESTS
    value: "2"
  - name: QUOTA_MEMORY_REQUESTS
    value: 4Gi
  - name: QUOTA_CPU_LIMITS
    value: "4"
  - name: QUOTA_MEMORY_LIMITS
    value: 8Gi
  - name: QUOTA_PODS
    value: "10"
